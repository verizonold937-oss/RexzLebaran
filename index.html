<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RexzRamadhan</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f3d2e, #14532d);
    color: white;
    text-align: center;
}

/* HEADER */
.header {
    padding: 40px 20px;
}

.header h1 {
    font-size: 40px;
    color: gold;
}

.header p {
    opacity: 0.8;
}

/* CARD */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.1);
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 20px;
    background: gold;
    color: black;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}

/* FOOTER */
.footer {
    margin-top: 30px;
    padding: 20px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">
    <h1>🌙 Selamat Ramadhan</h1>
    <p>Minal Aidzin Walfaizin 🙏</p>
</div>

<div class="container">

    <div class="card">
        <h2>💸 Minta THR</h2>
        <p>Klik tombol di bawah buat kirim THR 😁</p>
        <a class="btn" href="#">Kirim THR</a>
    </div>

    <div class="card">
        <h2>📿 Doa Hari Ini</h2>
        <p>Semoga puasanya lancar dan penuh berkah</p>
    </div>

    <div class="card">
        <h2>🍽️ Menu Buka</h2>
        <p>Kolak + Es Teh + Gorengan 🔥</p>
    </div>

    <div class="card">
        <h2>🎁 Event Lebaran</h2>
        <p>Bagi-bagi hadiah & THR spesial!</p>
    </div>

</div>

<div class="footer">
    <p>© 2026 RexzHub Ramadhan Edition</p>
</div>

</body>
</html>
