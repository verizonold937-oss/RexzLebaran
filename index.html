<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexz Ramadhan Lebaran Meriah</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#064e3b,#022c22);
    overflow-x: hidden;
    color: white;
    text-align: center;
}

/* MASJID SILHOUETTE */
#masjid {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 200px;
    background: url('https://i.imgur.com/UpVq0b1.png') no-repeat bottom center;
    background-size: contain;
    pointer-events: none;
    z-index: 0;
}

/* BULAN & BINTANG */
.star, .moon {
    position: absolute;
    color: gold;
    font-size: 20px;
}

.moon {
    font-size: 50px;
    top: 20px;
    right: 50px;
    animation: moonmove 10s linear infinite;
}

@keyframes moonmove {
    0% { transform: translateY(0px); }
    50% { transform: translateY(15px); }
    100% { transform: translateY(0px); }
}

/* KEMBANG API */
.firework {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: gold;
    animation: firework 1s linear infinite;
}

@keyframes firework {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    50% { transform: translate(calc(50px - 25px), -100px) scale(2); opacity: 0.7; }
    100% { transform: translate(0,0) scale(1); opacity: 1; }
}

/* UANG THR JATUH */
.money {
    position: absolute;
    font-size: 24px;
    color: gold;
    top: -50px;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-50px) rotate(0deg); opacity:1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity:0; }
}

/* ANIMASI TEXT */
#intro {
    font-size: 28px;
    color: gold;
    margin-top: 30px;
    height: 40px;
    letter-spacing: 2px;
    animation: glow 2s infinite;
}

/* efek glow */
@keyframes glow {
    0% { text-shadow: 0 0 5px gold; }
    50% { text-shadow: 0 0 20px gold; }
    100% { text-shadow: 0 0 5px gold; }
}

/* HEADER */
h1 {
    color: gold;
    font-size: 40px;
    margin-top: 20px;
}

/* CARD */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    position: relative;
    z-index: 1;
}

.card {
    background: rgba(255,255,255,0.05);
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.1);
}

/* BUTTON */
.btn {
    background: gold;
    color: black;
    padding: 12px 20px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    display: inline-block;
    margin-top: 10px;
    animation: glow 2s infinite;
}

.btn:hover {
    background: orange;
}

/* FOOTER */
.footer {
    margin-top: 30px;
    padding: 20px;
    opacity: 0.7;
    position: relative;
    z-index: 1;
}
</style>
</head>

<body>

<audio autoplay loop>
  <source src="https://assets.mixkit.co/active_storage/sfx/1488/1488-preview.mp3" type="audio/mpeg">
</audio>

<div id="intro"></div>

<h1>🌙 Selamat Ramadhan & Lebaran</h1>
<p>Minal Aidzin Walfaizin 🙏</p>

<div class="container">
<div class="card">
<h2>💸 Minta THR</h2>
<p>Yang baik hati silakan kirim THR 😁</p>
<a class="btn" href="https://saweria.co/RexzCihuy" target="_blank">💰 Kirim THR</a>
</div>

<div class="card">
<h2>📿 Doa Hari Ini</h2>
<p>Semoga puasanya lancar dan penuh berkah</p>
</div>

<div class="card">
<h2>🍽️ Menu Buka</h2>
<p>Kolak + Es Teh + Gorengan 🔥</p>
</div>

<div class="card">
<h2>🎁 Event Lebaran</h2>
<p>Bagi-bagi hadiah & THR spesial!</p>
</div>
</div>

<div class="footer">
<p>© 2026 RexzHub Ramadhan Edition</p>
</div>

<!-- MASJID SILHOUETTE -->
<div id="masjid"></div>

<script>
/* TYPING EFFECT */
const text = "👋 Hello aku Rexz - Minal Aidzin Walfaizin 🙏";
let i = 0;
function typing() {
    if(i<text.length){
        document.getElementById("intro").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,50);
    }
}
typing();

/* BINTANG RANDOM */
for(let j=0;j<50;j++){
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random()*window.innerHeight + "px";
    star.style.left = Math.random()*window.innerWidth + "px";
    star.innerHTML = "⭐";
    document.body.appendChild(star);
}

/* KEMBANG API RANDOM WARNA-WARNI */
function randomColor() {
    const colors = ["#FFD700","#FF4500","#1E90FF","#ADFF2F","#FF69B4"];
    return colors[Math.floor(Math.random()*colors.length)];
}

for(let k=0;k<10;k++){
    let firework = document.createElement("div");
    firework.className = "firework";
    firework.style.left = Math.random()*window.innerWidth + "px";
    firework.style.top = Math.random()*window.innerHeight/2 + "px";
    firework.style.background = randomColor();
    document.body.appendChild(firework);
}

/* UANG THR JATUH */
function spawnMoney(){
    let money = document.createElement("div");
    money.className = "money";
    money.style.left = Math.random()*window.innerWidth + "px";
    money.innerHTML = "💰";
    document.body.appendChild(money);
    setTimeout(()=>{money.remove()},5000);
}
setInterval(spawnMoney, 500);
</script>

</body>
</html>
